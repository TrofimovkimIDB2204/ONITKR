
services:
  db:
    image: postgres:15
    container_name: simracing_postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d simracing_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    
    build: 
      context: .
    container_name: simracing_app
    ports:
      - "${APP_PORT}:${APP_PORT}"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - APP_PORT=${APP_PORT}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data: