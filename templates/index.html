<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления Гран-при</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .table-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="container py-5">
    <h2 class="mb-4 text-center">Управление участниками Гран-при</h2>
    <h1>ТестААА</h1>
    <div class="table-container mb-5">
        <table class="table table-hover">
            <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>ФИО Пилота</th>
                    <th>Лучший круг (сек)</th>
                    <th>Действие</th>
                </tr>
            </thead>
            <tbody>
                {% for driver in drivers %}
                <tr>
                    <td>{{ driver.id }}</td>
                    <td>{{ driver.name }}</td>
                    <td>{{ driver.best_lap_time }}</td>
                    <td>
                        <a href="/gui/edit/{{ driver.id }}" class="btn btn-sm btn-outline-primary me-2">Изменить</a>
                        <a href="/gui/delete/{{ driver.id }}" class="btn btn-sm btn-outline-danger">Удалить строку</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="card card-body">
                <h5>Добавление данных</h5>
                <form action="/gui/drivers/" method="post">
                    <div class="mb-3">
                        <label class="form-label">ФИО</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Лучший круг</label>
                        <input type="number" step="0.001" name="best_lap_time" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Добавить</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
